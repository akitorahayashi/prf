name: 'Setup Rust Environment'
description: 'Installs Rust, caches Cargo dependencies, and optionally installs mise tools'
inputs:
  rust-version:
    description: 'Rust toolchain version'
    required: false
    default: 'stable'
  components:
    description: 'Rust toolchain components to install (comma-separated, e.g., rustfmt,clippy)'
    required: false
    default: ''
  install-mise:
    description: 'Install mise and optional tools'
    required: false
    default: 'false'
  mise-version:
    description: 'mise version to install'
    required: false
    default: '2026.2.19'
  mise-tools:
    description: 'mise install arguments (space-separated, e.g., cargo:cargo-tarpaulin actionlint)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: ${{ inputs.rust-version }}
        components: ${{ inputs.components }}

    - name: Cache Cargo dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Setup mise
      if: inputs.install-mise == 'true'
      uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      with:
        version: ${{ inputs.mise-version }}
        install_args: --locked

    - name: Install extra mise tools
      if: inputs.install-mise == 'true' && inputs.mise-tools != ''
      run: mise install ${{ inputs.mise-tools }}
      shell: bash
